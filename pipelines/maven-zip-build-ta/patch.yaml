---
- op: add
  path: /spec/description
  value: |
    This pipeline will build the maven zip to oci-artifact while maintaining trust after pipeline customization.

    _Uses `prefetch-dependencies` to fetch all artifacts which will be the content of the maven zip, and then uses `build-maven-zip-oci-ta` to create zip and push it to quay.io as oci-artifact. Information is shared between tasks using OCI artifacts instead of PVCs.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta?tab=tags)_
- op: replace
  path: /metadata/name
  value: maven-zip-build
- op: replace
  path: /metadata/labels
  value:
    "pipelines.openshift.io/used-by": "build-cloud"
    "pipelines.openshift.io/runtime": "generic"
    "pipelines.openshift.io/strategy": "maven-zip"
# Remove unused parameters from the template
# $ yq ".spec.params.[].name"  pipelines/template-build/template-build.yaml | nl -v 0
#      0  git-url
#      1  revision
#      2  output-image
#      3  path-context
#      4  dockerfile
#      5  rebuild
#      6  skip-checks
#      7  hermetic
#      8  prefetch-input
#      9  image-expires-after
#     10  build-source-image
#     11  build-image-index

- op: remove
  path: /spec/params/11  # build-image-index
- op: remove
  path: /spec/params/10  # build-source-image
- op: remove
  path: /spec/params/7  # hermetic
- op: remove
  path: /spec/params/4  # dockerfile
- op: remove
  path: /spec/params/3  # path-context
# Change default value of skip-checks
- op: replace
  path: /spec/params/4/default
  value: true
# Change default value of prefetch-input
- op: replace
  path: /spec/params/5/default
  value: "generic"
# Remove unused tasks
# kustomize build pipelines/template-build/ | yq ".spec.tasks.[].name" | nl -v 0
#      0  init
#      1  clone-repository
#      2  prefetch-dependencies
#      3  build-container
#      4  build-image-index
#      5  build-source-image
#      6  deprecated-base-image-check
#      7  clair-scan
#      8  ecosystem-cert-preflight-checks
#      9  sast-snyk-check
#     10  clamav-scan
#     11  apply-tags
#     12  push-dockerfile
#     13  rpms-signature-scan
- op: remove
  path: /spec/tasks/13  # rpms-signature-scan
- op: remove
  path: /spec/tasks/12  # push-dockerfile
- op: remove
  path: /spec/tasks/11  # apply-tags
- op: remove
  path: /spec/tasks/10  # clamav-scan
- op: remove
  path: /spec/tasks/9  # sast-snyk-check
- op: remove
  path: /spec/tasks/8  # ecosystem-cert-preflight-checks
- op: remove
  path: /spec/tasks/7  # clair-scan
- op: remove
  path: /spec/tasks/6  # deprecated-base-image-check
- op: remove
  path: /spec/tasks/5  # build-source-image
- op: remove
  path: /spec/tasks/4  # build-image-index
- op: remove
  path: /spec/tasks/3  # build-container
# clone-repository Task
- op: replace
  path: /spec/tasks/1/taskRef/name
  value: git-clone-oci-ta
- op: add
  path: /spec/tasks/1/params/-
  value:
    name: ociStorage
    value: $(params.output-image).git
- op: add
  path: /spec/tasks/1/params/-
  value:
    name: ociArtifactExpiresAfter
    value: $(params.image-expires-after)
- op: remove
  path: /spec/tasks/1/workspaces/0
# prefetch-dependencies Task
- op: replace
  path: /spec/tasks/2/taskRef/name
  value: prefetch-dependencies-oci-ta
- op: add
  path: /spec/tasks/2/params/-
  value:
    name: SOURCE_ARTIFACT
    value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
- op: add
  path: /spec/tasks/2/params/-
  value:
    name: ociStorage
    value: $(params.output-image).prefetch
- op: add
  path: /spec/tasks/2/params/-
  value:
    name: ociArtifactExpiresAfter
    value: $(params.image-expires-after)
- op: remove
  path: /spec/tasks/2/workspaces/0
- op: remove
  path: /spec/tasks/2/when
# Add new task of build-maven-zip-oci-ta
- op: add
  path: /spec/tasks/-
  value:
  - name: build-oci-artifact
    params:
    - name: IMAGE
      value: $(params.output-image)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    runAfter:
    - prefetch-dependencies
    taskRef:
      name: build-maven-zip-oci-ta
      version: "0.1"
    when:
    - input: $(tasks.init.results.build)
      operator: in
      values:
      - "true"
# change pipeline results
- op: replace
  path: /spec/results/0/value
  value: "$(tasks.build-oci-artifact.results.IMAGE_URL)"
- op: replace
  path: /spec/results/1/value
  value: "$(tasks.build-oci-artifact.results.IMAGE_DIGEST)"
# change finally show-sbom result
- op: replace
  path: /spec/finally/0/params/0/value
  value: "$(tasks.build-oci-artifact.results.IMAGE_URL)"
# show-summary
# This Task relies on a shared workspace for some of its functionality. Although optional, it raises
# the question of how valuable this Task actually is. Rather than add Trusted Artifacts support for
# this Task, we are taking the approach of just removing it altogether. Additional context on this
# decision can be found in https://issues.redhat.com/browse/EC-643.
- op: remove
  path: /spec/finally/1
